<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPI Bếp - Dự báo chuẩn bị ca sáng</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>KPI Chuẩn Bị Bếp Ca Sáng</h1>
        <p>
          Nhập tồn cuối ngày và sản lượng dự kiến giờ cao điểm ngày mai để hệ thống tự
          tính khối lượng cần chuẩn bị.
        </p>
      </header>

      <section class="card">
        <h2>1) Tồn cuối ngày hôm nay</h2>
        <div class="grid">
          <label>
            Đậu đang có (miếng)
            <input id="currentTofuPieces" type="number" min="0" step="1" value="20" />
          </label>

          <label>
            Bò đang có (kg)
            <input id="currentBeefKg" type="number" min="0" step="0.01" value="0.3" />
          </label>

          <label>
            Nước dùng đang có (nồi)
            <input id="currentBrothPots" type="number" min="0" step="0.01" value="0.3" />
          </label>
        </div>
      </section>

      <section class="card">
        <h2>2) Dự báo sản lượng giờ cao điểm ngày mai</h2>
        <div class="grid">
          <label>
            Số bát bún đầy đủ dự kiến bán
            <input id="predictedBowls" type="number" min="0" step="1" value="300" />
          </label>

          <label>
            Giờ bắt đầu làm bếp
            <input id="kitchenStartTime" type="time" value="06:00" />
          </label>
        </div>
      </section>

      <section class="card">
        <h2>3) Định mức & năng lực bếp (có thể chỉnh)</h2>
        <div class="grid">
          <label>
            Đậu / bát (miếng)
            <input id="tofuPerBowl" type="number" min="0" step="0.1" value="5" />
          </label>

          <label>
            1 bìa đậu chiên ra (miếng)
            <input id="tofuPiecesPerBlock" type="number" min="0.1" step="0.1" value="8" />
          </label>

          <label>
            Mỗi mẻ chiên đậu (bìa)
            <input id="tofuBlocksPerBatch" type="number" min="0.1" step="0.1" value="25" />
          </label>

          <label>
            Thời gian 1 mẻ đậu (phút)
            <input id="tofuBatchMinutes" type="number" min="0.1" step="0.1" value="12" />
          </label>

          <label>
            Bò / bát (gram)
            <input id="beefGramsPerBowl" type="number" min="0" step="1" value="35" />
          </label>

          <label>
            Mỗi mẻ sơ chế bò (kg)
            <input id="beefKgPerBatch" type="number" min="0.1" step="0.1" value="2" />
          </label>

          <label>
            Thời gian 1 mẻ bò (phút)
            <input id="beefBatchMinutes" type="number" min="0.1" step="0.1" value="10" />
          </label>
        </div>

        <button id="calculateButton">Tính KPI cho bếp ngày mai</button>
      </section>

      <section id="result" class="card result" hidden>
        <h2>Kết quả KPI bếp ngày mai</h2>
        <div id="resultContent"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
